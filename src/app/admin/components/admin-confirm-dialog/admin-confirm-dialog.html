<app-admin-modal [title]="title" (close)="cancelled.emit()">
  <p class="admin-confirm-message">{{ message }}</p>

  <div class="admin-confirm-actions">
    <button type="button" class="app-action-btn" (click)="cancelled.emit()">{{ cancelLabel }}</button>
    <button
      type="button"
      class="app-action-btn"
      [class.primary]="!danger"
      [class.danger]="danger"
      (click)="confirmed.emit()"
    >
      {{ confirmLabel }}
    </button>
  </div>
</app-admin-modal>
