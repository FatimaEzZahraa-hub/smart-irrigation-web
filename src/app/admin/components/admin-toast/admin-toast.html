<div class="admin-toast-host">
  <div class="admin-toast" [ngClass]="toast.type" *ngFor="let toast of (toastService.toasts$ | async)">
    <mat-icon>{{ toast.type === 'success' ? 'check_circle' : 'error' }}</mat-icon>
    <span>{{ toast.message }}</span>
    <button type="button" (click)="toastService.dismiss(toast.id)" aria-label="Dismiss">
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>
